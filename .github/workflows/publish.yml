name: Publicar en PyPI (Producción)

on:
  release:
    types: [published]  # Se dispara solo cuando creas un Release en GitHub

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    
    # Estos permisos son obligatorios si vas a usar la Opción A (Trusted Publishers)
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependencias de validación y empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install build twine pytest scipy numpy matplotlib pandas

    - name: Ejecutar Pruebas de Calidad
      run: |
        pytest tests/ -v  # Si un test falla, cancela la subida automáticamente

    - name: Compilar Distribución (Build)
      run: |
        python -m build

    - name: Verificar Metadatos con Twine
      run: |
        twine check dist/*

    - name: Publicar Paquete en PyPI Oficial
      uses: pypa/gh-action-pypi-publish@release/v1
      # NOTA: Si al final elegiste usar la Opción B (Repository Secrets), 
      # descomenta las siguientes dos líneas (quítales el #) para pasar el token:
      # with:
      #   password: ${{ secrets.PYPI_API_TOKEN }}
